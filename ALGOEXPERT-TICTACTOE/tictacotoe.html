<div id="board">
  <h1>Tic Tac Toe</h1>
  <h2 id="game-heading" aria-live="polite">Player 1's Turn</h2>
  <table role="grid">
    <tbody>
      <tr>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
      </tr>
      <tr>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
      </tr>
      <tr>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
        <td><button class="game-square"></button></td>
      </tr>
    </tbody>
  </table>
  <button id="restart-button">Restart Game</button>
  <style>
    #board {
      width: 280px;
      min-height: 450px;
      border-radius: 10%;
      padding: 0 20px 20px 20px;
      text-align: center;
      background-color: grey;
      color: white;
    }

    h1 {
      padding-top: 12px;
    }

    h2 {
      margin: 8px;
    }

    table {
      margin: auto;
      border-spacing: 8px;
    }

    button {
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      background-color: #6e072d;
      border-color: #6e6e6e;
      color: white;
    }

    .game-square {
      font-size: 50px;
      width: 70px;
      height: 70px;
      vertical-align: top;
    }

    .game-square:disabled {
      cursor: default;
    }

    #restart-button {
      display: none;
      font-size: 24px;
      padding: 12px;
      margin: 12px auto;
    }
  </style>
  <script>
    // Or run when DOM is ready (safe anywhere):
    document.addEventListener('DOMContentLoaded', onTilePress);
    document.addEventListener('DOMContentLoaded', findTicTacToeWinner);

    function onTilePress() {
      console.log("Adding event listeners to game squares...");
      const gameSquares = document.querySelectorAll(".game-square");
      const dynamicHeading = document.getElementById("game-heading");
      const restartButton = document.getElementById("restart-button");

      var curPlayer = 1;
      var curPlayerState = 'X';
      var gameEnd = false;

      gameSquares.forEach(selectedButton => {
        selectedButton.addEventListener("click", function() {
          if (curPlayer === 1) {
            curPlayer = 2;
            curPlayerState = 'O';
            dynamicHeading.textContent = "Player 1's Turn";
          } else if (curPlayer === 2) {
            curPlayer = 1;
            curPlayerState = 'X';
            dynamicHeading.textContent = "Player 2's Turn";
          }

          selectedButton.textContent = curPlayerState;
          selectedButton.disabled = true;

          let gameEndStatus = findTicTacToeWinner(); // Make sure this function exists
          gameEnd = true;
          console.log(gameEndStatus)

          if (gameEndStatus === "TIE") {
            dynamicHeading.textContent = "Tie Game!";
          } else if (gameEndStatus === "ONE") {
            dynamicHeading.textContent = "Player 1 Won!";
          } else if (gameEndStatus === "TWO") {
            dynamicHeading.textContent = "Player 2 Won!";
          } else {
            gameEnd = false;
          }

          if (gameEnd === true) {
            restartButton.style.display = 'block'; // show restart button
          }
        });
      });

      restartButton.addEventListener("click", function() {
        gameSquares.forEach(gameSquare => {
          gameSquare.textContent = '';
          gameSquare.disabled = false;
        });
        curPlayer = 1;
        curPlayerState = 'X';
        dynamicHeading.textContent = "Player 1's Turn";
        restartButton.style.display = 'none'; // hide button
      });
    }

    function findTicTacToeWinner()
    {
        // Convert NodeList to array (if needed)
        const gameSquares = document.querySelectorAll('.game-square');
        const board = Array.from(gameSquares).map(row => Array.from(row.textContent));
        
        // Count X and O
        let countX = 0;
        let countO = 0;
        
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (board[i][j] === 'X') {
                    countX++;
                } else if (board[i][j] === 'O') {
                    countO++;
                }
            }
        }
        
        // Early checks
        if (countX === 0 && countO === 0) return true;
        
        const letDiff = Math.abs(countX - countO);
        if (letDiff >= 2) return false;
        if (countO > countX) return false;
        if (countX === 0 && countO > 0) return false;
        
        // Initialize count map
        const encount = { 'X': 0, 'O': 0, ' ': 0 };
        
        // Check verticals
        for (let j = 0; j < 3; j++) {
            if (board[0][j] === board[1][j] && board[1][j] === board[2][j]) {
                const elem = board[0][j];
                if (encount[elem] !== undefined) encount[elem]++;
            }
        }
        
        // Check horizontals
        for (let i = 0; i < 3; i++) {
            if (board[i][0] === board[i][1] && board[i][1] === board[i][2]) {
                const elem = board[i][0];
                if (encount[elem] !== undefined) encount[elem]++;
            }
        }
        
        // Check diagonals
        if (board[0][0] === board[1][1] && board[1][1] === board[2][2]) {
            const elem = board[1][1];
            if (encount[elem] !== undefined) encount[elem]++;
        }
        
        if (board[0][2] === board[1][1] && board[1][1] === board[2][0]) {
            const elem = board[1][1];
            if (encount[elem] !== undefined) encount[elem]++;
        }
        
        // Check frequencies
        let gameEndStatus = 'UNKNOWN'
        if (encount['X'] >= 1) {
          gameEndStatus = "ONE"
        } else if(encount['O'] >= 1){
          gameEndStatus = 'TWO'
        } else {
          gameEndStatus = "TIE"
        }
        
        return gameEndStatus;
      }
  </script>
</div>
