<!-- A web counter that can increment and decrement a counter on a click -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>A basic single page web counter</title>
    <style>
        .vertical-btn-group { display: flex; flex-direction: column; gap: 8px; max-width: 320px; }
        .button { padding: 14px 14px; font-weight: 600; background:yellow; border:10px solid black; cursor:progress; }
    </style>
</head>
<body>
    <h1 style="text-align: left;">A basic HTML web counter</h1>
    <p><strong>Current Count : </strong><span id="globalCount">0</span></p>

    <div class="vertical-btn-group">
        <button class="button" type="button" id="incrButton">Increment Count By One</button>
        <button class="button" type="button" id="decrButton">Decrement Count By One</button>
        <button class="button" type="button" id="resetButton">Reset The Counter To Zero</button>
    </div>

    <script>
    // Basic Javascript for increment-decrement counter application
    (function(){
        var globalCountValue = 0;
        var display = document.getElementById('globalCount');

        function render(){ display.textContent = globalCountValue; }

        document.getElementById('incrButton').addEventListener('click', function(){ globalCountValue++; render(); });
        document.getElementById('decrButton').addEventListener('click', function(){ globalCountValue--; render(); });
        document.getElementById('resetButton').addEventListener('click', function(){ globalCountValue = 0; render(); });
    })();
    </script>
</body>
</html>
